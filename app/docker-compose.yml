services:
  app:
    image: nginx:stable-alpine
    container_name: spec-aligned-ai
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - horizon
    networks:
      - said-network

  php:
    image: said-php
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    container_name: spec-aligned-ai-php
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=said
      - DB_USERNAME=said
      - DB_PASSWORD=said_secret
      - S3_ENDPOINT=http://minio:9000
      - S3_KEY=said_admin
      - S3_SECRET=said_secret
      - S3_BUCKET=said-specs
      - S3_REGION=us-east-1
      - SAID_ROOT
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/docker/.env
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SAID_ROOT:?SAID_ROOT_not_set}:/said-projects
    depends_on:
      - postgres
      - minio
    networks:
      - said-network

  horizon:
    image: said-horizon
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    container_name: spec-aligned-ai-horizon
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=said
      - DB_USERNAME=said
      - DB_PASSWORD=said_secret
      - S3_ENDPOINT=http://minio:9000
      - S3_KEY=said_admin
      - S3_SECRET=said_secret
      - S3_BUCKET=said-specs
      - S3_REGION=us-east-1
      - SAID_ROOT
    volumes:
      - ./backend:/var/www/html
      - ${SAID_ROOT:?SAID_ROOT_not_set}:/said-projects
    command: php /var/www/html/artisan horizon
    depends_on:
      - php
      - postgres
      - redis
      - minio
    networks:
      - said-network

  redis:
    image: redis:7-alpine
    container_name: spec-aligned-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - said-network

  postgres:
    image: postgres:16-alpine
    container_name: spec-aligned-ai-postgres
    environment:
      - POSTGRES_DB=said
      - POSTGRES_USER=said
      - POSTGRES_PASSWORD=said_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - said-network

  minio:
    image: minio/minio:latest
    container_name: spec-aligned-ai-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=said_admin
      - MINIO_ROOT_PASSWORD=said_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - said-network

networks:
  said-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  minio_data:
